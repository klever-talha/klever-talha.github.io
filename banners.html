          rgba(0, 0, 0, 1) 85%,
          rgba(0, 0, 0, 0) 100%

        -webkit-mask-repeat: no-repeat;
        -webkit-mask-size: cover;
        mask-image: linear-gradient(

          rgba(0, 0, 0, 1) 85%,
          rgba(0, 0, 0, 0) 100%

  <script>
    const PAGE_SIZE = 8;
    let allAds = [];
    let filteredAds = [];
    let currentPage = 0;
    let siteMode = '';

    function createAdBox(ad, index) {
      const box = document.createElement('div');
      const isFeatured = index < 6;
      box.className = `ad-box ${ad.category}${isFeatured ? ' featured' : ''}`;
      const preview = `${ad.path}/preview.png`;

      box.innerHTML = `
        ${isFeatured ? '<div class="featured-badge"><i class="fas fa-star"></i> Featured</div>' : ''}
        <div class="ad-content">
          <div class="ad-category">${ad.category.replace('-', ' ')}</div>
          <div class="ad-title">${ad.title}</div>
        </div>
        <img class="ad-preview" src="${preview}" alt="${ad.title} Preview" loading="lazy">
      `;

      box.onclick = () => {
        const folderName = ad.path.split('/').pop();
        if (siteMode !== 'full') {
          window.location.href = `project.html?id=${folderName}`;
        } else {
          window.location.href = `project.html?id=${folderName}&mode=full`;
        }
      };

      return box;
    }

    function renderNextPage() {
      const container = document.getElementById('ads-container');
      const start = currentPage * PAGE_SIZE;
      const slice = filteredAds.slice(start, start + PAGE_SIZE);

      slice.forEach((ad, i) => container.appendChild(createAdBox(ad, start + i)));
      currentPage++;

      updateShowMoreBtn();
    }

    function updateShowMoreBtn() {
      const btn = document.getElementById('show-more-btn');
      const totalShown = currentPage * PAGE_SIZE;
      btn.style.display = totalShown < filteredAds.length ? 'block' : 'none';
    }

    function applyFilter(filter) {
      currentPage = 0;
      filteredAds = filter === 'all'
        ? allAds
        : allAds.filter((ad) => ad.category === filter);

      document.getElementById('ads-container').innerHTML = '';
      renderNextPage();
    }

    async function loadAds() {
      try {
        const res = await fetch('ads-data.json', { cache: 'no-store' });
        allAds = await res.json();

        const url = new URL(window.location.href);
        siteMode = url.searchParams.get('mode') || '';

        if (siteMode !== 'full') {
          document.querySelector('.wrapper.full').style = 'margin-top: 0px;';
          document.querySelector('.header')?.remove();
          document.querySelector('.footer')?.remove();
        }

        // Initial render
        applyFilter('all');

        // Filter buttons
        document.querySelectorAll('.btn[data-filter]').forEach((btn) => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.btn').forEach((b) => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilter(btn.getAttribute('data-filter'));
          });
        });

        // Show More button
        document.getElementById('show-more-btn').addEventListener('click', renderNextPage);

      } catch (e) {
        console.error('Error loading ads:', e);
      }
    }

    loadAds();
  </script>
